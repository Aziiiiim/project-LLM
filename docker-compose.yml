services:
  neo4j:
    image: neo4j:latest
    environment:
        - NEO4J_AUTH=neo4j/your_password
        - NEO4J_PLUGINS=["apoc"] # https://github.com/langchain-ai/langchain/issues/12901
    ports:
      - "7474:7474"
      - "7687:7687"
    restart: on-failure
    volumes:
      - neo4j_data:/data
      - ./neo4j_init:/neo4j_init

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    restart: always
    depends_on:
      - neo4j

  frontend:
    build: ./cookassistant-ui
    env_file:
      - ./.env
    ports:
      - "5173:5173"
    restart: on-failure
    depends_on:
      - backend
      - neo4j

volumes:
  neo4j_data:
