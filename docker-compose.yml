services:
  neo4j:
    image: neo4j:latest
    environment:
        - NEO4J_AUTH=neo4j/your_password
        - NEO4J_PLUGINS=["apoc"] # https://github.com/langchain-ai/langchain/issues/12901
    ports:
      - "7474:7474"
      - "7687:7687"
    restart: on-failure
    volumes:
      - neo4j_data:/data
      - ./neo4j_init:/neo4j_init

  backend:
    build: ./backend
    env_file:
      - ./.env
    restart: always
    depends_on:
      - neo4j

  frontend:
    build: ./cookassistant-ui
    env_file:
      - ./.env
    environment:
      - VITE_BACKEND_URL=http://backend:8000
    ports:
      - "5173:5173"
    restart: on-failure
    depends_on:
      - backend
      - neo4j

volumes:
  neo4j_data:
